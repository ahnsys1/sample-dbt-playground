version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_dates
    columns:
      - name: date_id
        tests:
          - not_null
          - unique

  - name: dim_product_types
    columns:
      - name: product_type_id
        tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_sku
        tests:
          - not_null
          - unique
      - name: product_type_id
        tests:
          - relationships:
              to: ref('dim_product_types')
              field: product_type_id

  - name: dim_stores
    columns:
      - name: store_id
        tests:
          - not_null
          - unique
      - name: opened_date_id
        tests:
          - relationships:
              to: ref('dim_dates')
              field: date_id

  - name: dim_supplies
    columns:
      - name: supply_key
        tests:
          - not_null
          - unique
      - name: product_sku
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_sku

  - name: fact_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: store_id
        tests:
          - relationships:
              to: ref('dim_stores')
              field: store_id
      - name: order_date_id
        tests:
          - relationships:
              to: ref('dim_dates')
              field: date_id

  - name: fact_order_items
    columns:
      - name: item_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - relationships:
              to: ref('fact_orders')
              field: order_id
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: product_sku
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_sku
      - name: order_date_id
        tests:
          - relationships:
              to: ref('dim_dates')
              field: date_id